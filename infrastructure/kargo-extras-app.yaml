apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-extras
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "29"
spec:
  project: platform
  source:
    repoURL: https://github.com/mmastersvz/platform-gitops.git
    targetRevision: HEAD
    path: infrastructure/kargo-extras
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
